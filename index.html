<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Mi Amor ❤️</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    text-align:center;
}

.contenedor{
    background:white;
    padding:30px;
    border-radius:20px;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

button{
    background:#ff4d6d;
    color:white;
    border:none;
    padding:15px 30px;
    font-size:20px;
    border-radius:12px;
    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

#contenido{
    display:none;
    margin-top:20px;
}

img{
    width:100%;
    border-radius:15px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="contenedor">

    <h1>❤️ Tengo algo para ti ❤️</h1>

    <button onclick="mostrar()">
        3 MESES
    </button>

    <div id="contenido">

        <img src="nosotros.jpeg" alt="Nosotros">

        <h2>Mi amor ❤️</h2>

        <p>
            Aquí escribes toda tu carta.
            Puedes contarle lo feliz que eres,
            agradecerle por estos 3 meses y decirle
            cuánto la amas.
        </p>

    </div>

</div>

<script>
function mostrar(){
    document.getElementById("contenido").style.display="block";
}
</script>

</body>
</html>
